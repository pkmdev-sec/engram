<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0f1628"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>

    <!-- Neural glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#00D4AA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="nodeGlowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#FFB347;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="nodeGlowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.7"/>
      <stop offset="60%" style="stop-color:#8B5CF6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </radialGradient>

    <!-- Soft ambient light from center -->
    <radialGradient id="ambientLight" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </radialGradient>

    <!-- Connection pulse gradient -->
    <linearGradient id="connPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="connPulseAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#FFB347;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:0"/>
    </linearGradient>

    <!-- Glow filter for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 3D depth shadow -->
    <filter id="depthShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Grid pattern for depth -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2240" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Perspective grid floor (3D depth) -->
  <g opacity="0.3" transform="translate(600,400) scale(1,0.3) translate(-600,-200)">
    <rect x="0" y="100" width="1200" height="300" fill="url(#grid)"/>
  </g>

  <!-- Ambient light bloom -->
  <ellipse cx="600" cy="200" rx="500" ry="250" fill="url(#ambientLight)"/>

  <!-- Neural network connections (back layer — depth) -->
  <g opacity="0.15">
    <line x1="120" y1="140" x2="280" y2="210" stroke="#00D4AA" stroke-width="1"/>
    <line x1="280" y1="210" x2="180" y2="300" stroke="#00D4AA" stroke-width="1"/>
    <line x1="920" y1="130" x2="1060" y2="200" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="1060" y1="200" x2="980" y2="290" stroke="#8B5CF6" stroke-width="1"/>
  </g>

  <!-- Neural network connections (mid layer) -->
  <g opacity="0.25">
    <line x1="160" y1="180" x2="320" y2="130" stroke="#00D4AA" stroke-width="1.5"/>
    <line x1="160" y1="180" x2="250" y2="270" stroke="#00D4AA" stroke-width="1"/>
    <line x1="320" y1="130" x2="250" y2="270" stroke="#00D4AA" stroke-width="1"/>
    <line x1="320" y1="130" x2="420" y2="200" stroke="#00D4AA" stroke-width="1.5" stroke-dasharray="4,6"/>

    <line x1="880" y1="170" x2="1000" y2="120" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="880" y1="170" x2="960" y2="280" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="1000" y1="120" x2="1080" y2="220" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="1000" y1="120" x2="850" y2="100" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,6"/>
  </g>

  <!-- Active connection pulses (animated feel through gradient) -->
  <line x1="250" y1="270" x2="420" y2="200" stroke="url(#connPulse)" stroke-width="2"/>
  <line x1="420" y1="200" x2="470" y2="170" stroke="url(#connPulse)" stroke-width="2" opacity="0.6"/>
  <line x1="780" y1="180" x2="880" y2="170" stroke="url(#connPulseAmber)" stroke-width="2"/>
  <line x1="730" y1="220" x2="780" y2="180" stroke="url(#connPulseAmber)" stroke-width="2" opacity="0.6"/>

  <!-- Flow arrows: left cluster → center → right cluster -->
  <path d="M 420 200 Q 500 180 530 195" fill="none" stroke="#00D4AA" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,5"/>
  <path d="M 680 195 Q 720 175 780 180" fill="none" stroke="#FFB347" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,5"/>

  <!-- Left neural cluster: DISTILL side -->
  <!-- Back nodes (smaller, dimmer = depth) -->
  <circle cx="120" cy="140" r="3" fill="#00D4AA" opacity="0.3"/>
  <circle cx="180" cy="300" r="3" fill="#00D4AA" opacity="0.3"/>
  <circle cx="350" cy="280" r="2.5" fill="#00D4AA" opacity="0.2"/>

  <!-- Mid nodes -->
  <g filter="url(#glow)">
    <circle cx="160" cy="180" r="5" fill="#00D4AA" opacity="0.7"/>
    <circle cx="320" cy="130" r="6" fill="#00D4AA" opacity="0.8"/>
    <circle cx="250" cy="270" r="5" fill="#00D4AA" opacity="0.6"/>
  </g>

  <!-- Front node (largest = closest) -->
  <g filter="url(#glowStrong)">
    <circle cx="420" cy="200" r="8" fill="#00D4AA"/>
    <circle cx="420" cy="200" r="18" fill="url(#nodeGlow)"/>
  </g>

  <!-- Right neural cluster: INJECT side -->
  <circle cx="920" cy="130" r="3" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="980" cy="290" r="3" fill="#8B5CF6" opacity="0.3"/>

  <g filter="url(#glow)">
    <circle cx="880" cy="170" r="5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="1000" cy="120" r="6" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="960" cy="280" r="5" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="1080" cy="220" r="5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="850" cy="100" r="4" fill="#8B5CF6" opacity="0.5"/>
  </g>

  <g filter="url(#glowStrong)">
    <circle cx="780" cy="180" r="8" fill="#8B5CF6"/>
    <circle cx="780" cy="180" r="18" fill="url(#nodeGlowPurple)"/>
  </g>

  <!-- Center brain core: the engram -->
  <g filter="url(#glowStrong)">
    <circle cx="600" cy="195" r="12" fill="#FFB347"/>
    <circle cx="600" cy="195" r="28" fill="url(#nodeGlowAmber)"/>
  </g>

  <!-- Orbiting knowledge fragments around center -->
  <g opacity="0.5">
    <circle cx="570" cy="170" r="2.5" fill="#FFB347" filter="url(#glow)"/>
    <circle cx="635" cy="175" r="2" fill="#FFB347" filter="url(#glow)"/>
    <circle cx="585" cy="225" r="2" fill="#FFB347" filter="url(#glow)"/>
    <circle cx="620" cy="218" r="1.8" fill="#FFB347" filter="url(#glow)"/>
  </g>

  <!-- Subtle hexagonal structure around center (knowledge crystal) -->
  <polygon points="600,155 630,175 630,215 600,235 570,215 570,175"
           fill="none" stroke="#FFB347" stroke-width="0.8" opacity="0.15"/>
  <polygon points="600,165 620,178 620,212 600,225 580,212 580,178"
           fill="none" stroke="#FFB347" stroke-width="0.5" opacity="0.1"/>

  <!-- Stage labels (subtle, positioned near clusters) -->
  <text x="280" y="340" font-family="SF Mono, Menlo, monospace" font-size="10"
        fill="#00D4AA" opacity="0.4" text-anchor="middle" letter-spacing="2">DISTILL</text>
  <text x="600" y="280" font-family="SF Mono, Menlo, monospace" font-size="10"
        fill="#FFB347" opacity="0.4" text-anchor="middle" letter-spacing="2">STORE</text>
  <text x="920" y="340" font-family="SF Mono, Menlo, monospace" font-size="10"
        fill="#8B5CF6" opacity="0.4" text-anchor="middle" letter-spacing="2">INJECT</text>

  <!-- Main title -->
  <g filter="url(#textGlow)">
    <text x="600" y="90" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif"
          font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="6">engram</text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="118" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
        font-size="14" fill="#8899bb" text-anchor="middle" letter-spacing="1.5"
        font-weight="300">knowledge intelligence for AI agents</text>

  <!-- Thin accent line under subtitle -->
  <line x1="520" y1="128" x2="680" y2="128" stroke="#00D4AA" stroke-width="0.5" opacity="0.3"/>

  <!-- Bottom tech badge strip -->
  <g transform="translate(600, 370)" text-anchor="middle">
    <text font-family="SF Mono, Menlo, monospace" font-size="9" fill="#556688" letter-spacing="1">
      TypeScript  ·  Claude Opus  ·  Claude Code Hooks  ·  221 Tests
    </text>
  </g>
</svg>
